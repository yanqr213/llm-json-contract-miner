name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      PYTHONPATH: src
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run unit tests
        run: python -m unittest discover -s tests
      - name: CLI smoke
        run: |
          python -m llm_json_contract_miner examples/outputs.jsonl --expected examples/expected.schema.json --no-fail --out reports --formats markdown,json,junit,schema,csv,fix-plan
          test -f reports/contract-report.md
          test -f reports/contract-report.json
          test -f reports/junit.xml
          test -f reports/schema.draft.json
          test -f reports/fields.csv
          test -f reports/contract-fix-plan.md
